version: "3.8"

services:
  backend:
    build: ./server
    container_name: sudomode-backend
    env_file:
      - ./server/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: sudomode-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
